name: video-tovarna

on:
  schedule:
    - cron: "0 7 * * *"   # kazdy den 07:00 UTC (09:00 CEST). Pridej dalsi radek pro 2. video.
  workflow_dispatch:        # rucni spusteni tlacitkem v zalozce Actions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # umlci Node 20 deprecation warning

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # aby workflow mohl commitnout stav rotace zpet do repa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}    # primy Gemini free tier (preferovany)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}   # zaloha kdyz neni Gemini
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_MODEL: eleven_multilingual_v2
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TTS_PROVIDER: ${{ vars.TTS_PROVIDER }}           # elevenlabs | edge (prazdne = edge)
          VOICE: cs-CZ-AntoninNeural                       # edge-tts fallback hlas
          MUSIC_VOLUME: "0.12"
          FEED: ${{ vars.FEED }}                           # bomby | nejpro | zakladni
          SELECT_MODE: ${{ vars.SELECT_MODE }}             # discount | random
          ROTATE: ${{ vars.ROTATE }}                       # 1 = neopakovat, 0 = vzdy nejlepsi nabidka
          DEST_FILTER: ${{ vars.DEST_FILTER }}             # napr. Chorvatsko (prazdne = vse)
          USE_VIDEO_BG: ${{ vars.USE_VIDEO_BG }}           # 1 = video pozadi, 0 = jen foto
          USE_SAMPLE_OFFER: ${{ vars.USE_SAMPLE_OFFER }}   # nastav na 1 pro test, 0 v ostrem provozu
          PUBLISH: ${{ vars.PUBLISH }}                     # 0 = jen render, 1 = publikovat
        run: python main.py

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: output/*.mp4
          retention-days: 7

      - name: Persist rotace stav
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json 2>/dev/null || true
          git commit -m "rotace: update seen [skip ci]" || echo "nic ke commitu"
          git push || echo "push se nepodaril"
