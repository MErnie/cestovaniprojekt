name: video-tovarna

on:
  schedule:
    - cron: "0 7 * * *"   # kazdy den 07:00 UTC (09:00 CEST). Pridej dalsi radek pro 2. video.
  workflow_dispatch:        # rucni spusteni tlacitkem v zalozce Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}   # napr. openai/gpt-4o-mini
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TTS_PROVIDER: edge                               # edge = cesky hlas zdarma
          VOICE: cs-CZ-AntoninNeural                       # cesky hlas (zkus i cs-CZ-VlastaNeural)
          MUSIC_VOLUME: "0.12"
          FEED: ${{ vars.FEED }}                           # bomby | nejpro | zakladni
          USE_SAMPLE_OFFER: ${{ vars.USE_SAMPLE_OFFER }}   # nastav na 1 pro test, 0 v ostrem provozu
          PUBLISH: ${{ vars.PUBLISH }}                     # 0 = jen render, 1 = publikovat
        run: python main.py

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: output/*.mp4
          retention-days: 7
